name: FinShield AI — CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('finshield_deepfake/requirements.txt') }}

      - name: Install CPU-only torch + deps
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install einops numpy opencv-python-headless albumentations scikit-learn
          pip install matplotlib seaborn fastapi uvicorn python-multipart pydantic

      - name: Syntax check all Python files
        run: |
          python -m py_compile finshield_deepfake/data_loader.py
          python -m py_compile finshield_deepfake/fusion.py
          python -m py_compile finshield_deepfake/model.py
          python -m py_compile finshield_deepfake/train.py
          python -m py_compile finshield_deepfake/evaluate.py
          python -m py_compile finshield_deepfake/inference_api.py

      - name: Run smoke tests (CPU)
        run: python finshield_deepfake/scripts/test_smoke.py
